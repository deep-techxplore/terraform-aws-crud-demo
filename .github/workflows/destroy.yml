name: Destroy (terraform-crud-demo stack)

# Manual only. From the Actions tab: Run workflow -> type "destroy" to confirm.
# Tears down ONLY the resources in this config's remote state (the
# terraform-crud-demo stack). Production resources are not in this state and
# cannot be touched.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down the terraform-crud-demo stack'
        required: true
        default: ""

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: "true"
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  destroy:
    # Hard gate: the job only runs if you typed exactly "destroy".
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # No jar build needed: the filemd5 hash in deploy.tf is guarded with
      # fileexists(), so destroy evaluates fine without the artifact.
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: terraform
        run: terraform destroy -input=false -auto-approve
