name: Deploy (Terraform + Spring Boot to Elastic Beanstalk)

# STEP 1 — every push to main triggers the full pipeline.
# (workflow_dispatch lets you run it manually from the Actions tab too.)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-south-1
  TF_IN_AUTOMATION: "true"
  # Terraform reads the RDS master password from this env var (TF_VAR_<name>
  # maps to var.db_password). Kept as a GitHub secret, never in the repo.
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Corretto)
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "17"
          cache: maven

      # STEP 7 — build the Spring Boot jar. Tests are skipped in CI because
      # CurdApplicationTests loads the full context and needs a reachable DB.
      # Output: curd/target/curd.jar (pom finalName=curd).
      - name: Build Spring Boot jar
        run: mvn -B -f curd/pom.xml clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # Self-bootstrap the remote-state backend: create the state bucket + lock
      # table ONLY if they don't already exist (idempotent). Hardcoded
      # terraform-crud-demo-* names — never touches any other/production resource.
      # This means you never have to run bootstrap/ manually.
      - name: Ensure remote state backend exists
        run: |
          set -euo pipefail
          BUCKET=terraform-crud-demo-tfstate-562460196046
          TABLE=terraform-crud-demo-locks
          REGION=ap-south-1

          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "State bucket already exists."
          else
            echo "Creating state bucket $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region "$REGION" \
              --create-bucket-configuration LocationConstraint="$REGION"
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block --bucket "$BUCKET" \
              --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          fi

          if aws dynamodb describe-table --table-name "$TABLE" --region "$REGION" >/dev/null 2>&1; then
            echo "Lock table already exists."
          else
            echo "Creating lock table $TABLE"
            aws dynamodb create-table --table-name "$TABLE" --region "$REGION" \
              --billing-mode PAY_PER_REQUEST \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH
            aws dynamodb wait table-exists --table-name "$TABLE" --region "$REGION"
          fi

      # STEP 2 — init / validate / plan / apply. Terraform runs in terraform/,
      # so the default app_jar_path (../curd/target/curd.jar) resolves to the
      # jar built above. Apply does STEP 3-5 (infra + env vars) and STEP 8-10
      # (upload jar, register version, update environment); EB then rolls it out
      # (STEP 11).
      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show outputs
        working-directory: terraform
        run: terraform output
